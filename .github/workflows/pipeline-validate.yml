name: Pipeline Validate

on:
  push:
    paths:
      - 'pipeline/**'
      - 'config/**'
      - 'data/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pipeline-validate.yml'
  pull_request:
    paths:
      - 'pipeline/**'
      - 'config/**'
      - 'data/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pipeline-validate.yml'

permissions:
  contents: read

jobs:
  pipeline-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: node --check pipeline/process-content.mjs
