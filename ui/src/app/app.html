<ion-app>
  <ion-header>
    <ion-toolbar>
      <ion-title class="header-title">
        <ion-img src="/branding/microsoft-logo.svg" alt="Microsoft logo" class="logo"></ion-img>
        <span>Azure AI Content Safety POC</span>
      </ion-title>
    </ion-toolbar>
    <ion-toolbar>
      <ion-segment [value]="activeSegment()" aria-label="Navigation">
        <ion-segment-button value="home" [routerLink]="['/home']">
          <ion-label>Home</ion-label>
        </ion-segment-button>
        <ion-segment-button value="documents" [routerLink]="['/documents']">
          <ion-label>Documents</ion-label>
        </ion-segment-button>
        <ion-segment-button value="results" [routerLink]="['/results']">
          <ion-label>Results & KPI</ion-label>
        </ion-segment-button>
        <ion-segment-button value="agent-safety" [routerLink]="['/agent-safety']">
          <ion-label>Agent Safety</ion-label>
        </ion-segment-button>
      </ion-segment>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <router-outlet></router-outlet>
  </ion-content>

  <ion-footer>
    <ion-toolbar>
      <div class="footer-content">
        <span>Michael Yaacoub</span>
        <a href="https://github.com/csdmichael" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://www.linkedin.com/in/michael-yaacoub-7a46436/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </div>
    </ion-toolbar>
  </ion-footer>
</ion-app>
