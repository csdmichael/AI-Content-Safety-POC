name: Pipeline – Process Content Safety

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/**'
      - 'config/**'
      - '.github/workflows/pipeline-process.yml'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline via API (runs inside VNet)
        run: |
          API_URL="https://ai-content-safety-api.azurewebsites.net"

          echo "Triggering pipeline..."
          curl -sf -X POST "$API_URL/api/pipeline/run"

          echo "Polling pipeline status..."
          while true; do
            RESPONSE=$(curl -sf "$API_URL/api/pipeline/status")
            STATUS=$(echo "$RESPONSE" | jq -r .status)
            PROCESSED=$(echo "$RESPONSE" | jq -r .processed)
            TOTAL=$(echo "$RESPONSE" | jq -r .total)
            echo "  Status: $STATUS ($PROCESSED/$TOTAL)"

            if [ "$STATUS" = "completed" ]; then
              echo "Pipeline completed successfully."
              echo "$RESPONSE" | jq .
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              echo "Pipeline failed."
              echo "$RESPONSE" | jq .
              exit 1
            fi

            sleep 10
          done
