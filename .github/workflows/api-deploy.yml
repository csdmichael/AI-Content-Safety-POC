name: API Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: api
        run: pip install -r requirements.txt -t .python_packages/lib/site-packages

      - name: Package
        working-directory: api
        run: zip -r ../api.zip server.py requirements.txt .python_packages

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group "${{ secrets.AZURE_WEBAPP_RESOURCE_GROUP }}" \
            --name ai-content-safety-api \
            --src-path api.zip \
            --type zip \
            --clean true
