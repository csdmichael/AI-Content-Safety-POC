name: Pipeline Validate

on:
  push:
    paths:
      - 'pipeline/**'
      - 'config/**'
      - 'data/manifest.json'
      - '.github/workflows/pipeline-validate.yml'
  pull_request:
    paths:
      - 'pipeline/**'
      - 'config/**'
      - 'data/manifest.json'
      - '.github/workflows/pipeline-validate.yml'

permissions:
  contents: read

jobs:
  pipeline-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Syntax check
        run: python -m py_compile pipeline/process_content.py
